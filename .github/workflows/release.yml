name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm test
      - run: npm run build -w plugin
      - run: npm run build -w encryptor
      - name: Stage encryptor assets with stable names
        run: cp encryptor/README.md encryptor-README.md
      - name: Create release with plugin + encryptor assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            plugin/main.js plugin/manifest.json plugin/styles.css plugin/versions.json \
            encryptor/encryptor.mjs encryptor-README.md encryptor/config.example.json \
            --title "${{ github.ref_name }}" \
            --generate-notes
